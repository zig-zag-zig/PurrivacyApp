appId: vip.chi_chi.purrivacy.dev
env:
  TEST_USERNAME: ${E2E_USERNAME}sc
  ACCOUNT_PASSWORD: Purrivacy-e2e-password-123
---
# Sign up and create a key, then verify settings persistence
- runFlow:
    file: subflows/register-create-key.yaml
    env:
      TEST_USERNAME: ${TEST_USERNAME}
- tapOn:
    id: "purrivacy.passphraseStorage.store"
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 60000
# Navigate to settings
- tapOn:
    id: "purrivacy.tab.settings"
- extendedWaitUntil:
    visible:
      id: "purrivacy.settings.screen"
    timeout: 15000
# Verify key settings are visible
- assertVisible:
    id: "purrivacy.settings.storePassphrases"
# Sign out
- scrollUntilVisible:
    element:
      id: "purrivacy.settings.logout"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "purrivacy.settings.logout"
# Verify redirected to sign-in
- extendedWaitUntil:
    visible:
      id: "purrivacy.signin.username"
    timeout: 15000
