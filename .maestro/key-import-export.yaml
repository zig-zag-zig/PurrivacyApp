---
# Sign up, create a key, then import a second key
- runFlow:
    file: subflows/register-create-key.yaml
    env:
      TEST_USERNAME: ${TEST_USERNAME}
- tapOn:
    id: "purrivacy.passphraseStorage.store"
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 60000
# Switch to Import tab and paste the public key
- tapOn:
    id: "purrivacy.key.action.import"
- tapOn:
    id: "purrivacy.key.import.armoredKey"
- inputText: ${IMPORT_PUBLIC_KEY}
- hideKeyboard
- tapOn:
    id: "purrivacy.key.import.submit"
# Verify imported key appears
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 30000
# Switch back to import and import the linked private key
- tapOn:
    id: "purrivacy.key.action.import"
- tapOn:
    id: "purrivacy.key.import.armoredKey"
- inputText: ${IMPORT_PRIVATE_KEY}
- hideKeyboard
- tapOn:
    id: "purrivacy.key.import.submit"
# Verify now have at least 2 key items
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 30000
# Verify we are back on the key screen
- assertVisible:
    id: "purrivacy.key.screen"
