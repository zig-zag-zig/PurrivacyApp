appId: vip.chi_chi.purrivacy
env:
  TEST_USERNAME: ${E2E_USERNAME}mfa
  ACCOUNT_PASSWORD: Purrivacy-e2e-password-123
---
# Sign up, create a key, then set up MFA
- runFlow:
    file: subflows/register-create-key.yaml
    env:
      TEST_USERNAME: ${TEST_USERNAME}
- tapOn:
    id: "purrivacy.passphraseStorage.store"
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 60000
# Navigate to settings and enable MFA
- tapOn:
    id: "purrivacy.tab.settings"
- extendedWaitUntil:
    visible:
      id: "purrivacy.settings.screen"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "purrivacy.settings.mfa"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "purrivacy.settings.mfa"
- extendedWaitUntil:
    visible:
      id: "purrivacy.mfa.setup.screen"
    timeout: 15000
- tapOn:
    id: "purrivacy.mfa.setup.enable"
- extendedWaitUntil:
    visible:
      id: "purrivacy.mfa.recovery.codes"
    timeout: 30000
- assertVisible:
    id: "purrivacy.mfa.recovery.codes.list"
- tapOn:
    id: "purrivacy.mfa.recovery.codes.saved"
# Verify MFA is now enabled
- extendedWaitUntil:
    visible:
      id: "purrivacy.settings.screen"
    timeout: 15000
- assertVisible:
    id: "purrivacy.settings.mfa.enabled"
# Sign out
- scrollUntilVisible:
    element:
      id: "purrivacy.settings.logout"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "purrivacy.settings.logout"
- extendedWaitUntil:
    visible:
      id: "purrivacy.signin.username"
    timeout: 15000
