appId: vip.chi_chi.purrivacy.dev
env:
  TEST_USERNAME: ${E2E_USERNAME}exp
  ACCOUNT_PASSWORD: Purrivacy-e2e-password-123
---
# Register, create a key, sign out, then sign back in to test session continuity
- runFlow:
    file: subflows/register-create-key.yaml
    env:
      TEST_USERNAME: ${TEST_USERNAME}
- tapOn:
    id: "purrivacy.passphraseStorage.store"
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 60000
# Sign out to clear in-memory session but keep stored refresh token
- tapOn:
    id: "purrivacy.tab.settings"
- extendedWaitUntil:
    visible:
      id: "purrivacy.settings.screen"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "purrivacy.settings.logout"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "purrivacy.settings.logout"
- extendedWaitUntil:
    visible:
      id: "purrivacy.signin.username"
    timeout: 15000
# Sign back in — session should be restored
- tapOn:
    id: "purrivacy.signin.username"
- inputText: ${TEST_USERNAME}
- tapOn:
    id: "purrivacy.signin.password"
- inputText: ${ACCOUNT_PASSWORD}
- hideKeyboard
- tapOn:
    id: "purrivacy.signin.submit"
# Should land on key screen with key visible
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 30000
# Verify the key screen is reachable (session restored)
- assertVisible:
    id: "purrivacy.key.screen"
