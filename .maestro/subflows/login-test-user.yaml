appId: vip.chi_chi.purrivacy.dev
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "purrivacy.signin.username"
    timeout: 15000
- tapOn:
    id: "purrivacy.signin.username"
- inputText: "purrivacye2eshared"
- tapOn:
    id: "purrivacy.signin.password"
- inputText: "Purrivacy-e2e-password-123"
- hideKeyboard
- tapOn:
    id: "purrivacy.signin.submit"
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 30000
