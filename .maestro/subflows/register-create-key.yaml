- inputText: ${TEST_USERNAME}
- tapOn:
    id: "purrivacy.signup.password"
- inputText: ${ACCOUNT_PASSWORD}
- tapOn:
    id: "purrivacy.signup.confirmPassword"
- inputText: ${ACCOUNT_PASSWORD}
- hideKeyboard
- tapOn:
    id: "purrivacy.signup.submit"
- runFlow:
    when:
      visible:
        id: "purrivacy.signup.submit"
    commands:
      - tapOn:
          id: "purrivacy.signup.submit"
- extendedWaitUntil:
