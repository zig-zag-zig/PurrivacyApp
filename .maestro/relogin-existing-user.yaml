appId: vip.chi_chi.purrivacy
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "purrivacy.signin.username"
    timeout: 15000
- tapOn:
    id: "purrivacy.signin.username"
- inputText: "e2e-shared"
- tapOn:
    id: "purrivacy.signin.password"
- inputText: "Purrivacy-e2e-password-123"
- hideKeyboard
- tapOn:
    id: "purrivacy.signin.submit"
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.screen"
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 60000
# Logout
- tapOn:
    id: "purrivacy.tab.settings"
- extendedWaitUntil:
    visible:
      id: "purrivacy.settings.screen"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "purrivacy.settings.logout"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "purrivacy.settings.logout"
- extendedWaitUntil:
    visible:
      id: "purrivacy.signin.username"
    timeout: 15000
# Re-login
- tapOn:
    id: "purrivacy.signin.username"
- inputText: "e2e-shared"
- tapOn:
    id: "purrivacy.signin.password"
- inputText: "Purrivacy-e2e-password-123"
- hideKeyboard
- tapOn:
    id: "purrivacy.signin.submit"
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.screen"
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: "purrivacy.key.item"
    timeout: 60000
